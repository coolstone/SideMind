<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">SideMind</title>
  <desc id="desc">由思维路径字母 S 与浏览器 AI 侧边栏节点组成的 SideMind 标志</desc>
  <defs>
    <linearGradient id="surface" x1="17" y1="10" x2="112" y2="119" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9A7BFF"/>
      <stop offset="0.48" stop-color="#6B4FEA"/>
      <stop offset="1" stop-color="#3048C9"/>
    </linearGradient>
    <linearGradient id="rail" x1="96" y1="34" x2="96" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9F4FF"/>
      <stop offset="1" stop-color="#57D2FF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="34" fill="url(#surface)"/>
  <rect x="3" y="3" width="122" height="122" rx="31" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M75.5 38.5C68 31.5 54.5 30.2 45.8 35.7C37.5 41 38.5 51.4 45.7 56.1C52.8 60.8 65.1 61.4 72.7 66.3C81.1 71.7 80.7 83.6 72.3 89C63.1 94.9 48.2 93.2 40.5 84.5" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="87" y="27" width="20" height="74" rx="10" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.2"/>
  <path d="M89 43H82M89 64H79M89 85H82" fill="none" stroke="#FFFFFF" stroke-opacity="0.64" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="url(#rail)" filter="url(#softGlow)">
    <circle cx="97" cy="43" r="4.5"/>
    <circle cx="97" cy="64" r="4.5"/>
    <circle cx="97" cy="85" r="4.5"/>
  </g>
</svg>
